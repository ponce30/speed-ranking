<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>走力ランキング — speed-ranking</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>走力ランキング</h1>
  <div class="controls">
    <div id="dropzone">
      <p>📁 CSVファイルをここにドロップ</p>
      <p>または <input type="file" id="fileInput" accept=".csv"></p>
      <p class="hint">「Stat Search Results」の生CSV(英語ヘッダ)を投入 → 自動で日本語列にマッピング・保存</p>
    </div>
    <div class="row">
      <label>履歴:</label>
      <select id="historySelect"><option>—</option></select>
      <button id="reloadBtn" type="button">⟳</button>
      <details>
        <summary>⚙️ GitHub PAT設定</summary>
        <div class="pat-box">
          <p class="hint">repo scope付きPATを1度だけペースト → ブラウザに保存(localStorage)。コミットに必要。</p>
          <div class="row">
            <input type="password" id="patInput" placeholder="ghp_... または gho_...">
            <button id="patSaveBtn" type="button">保存</button>
            <button id="patClearBtn" type="button">クリア</button>
          </div>
          <p class="hint" id="patStatus"></p>
        </div>
      </details>
    </div>
    <div id="status">準備完了</div>
  </div>
</header>
<main>
  <table id="dataTable">
    <thead></thead>
    <tbody></tbody>
  </table>
  <p id="emptyHint" class="hint" style="text-align:center;padding:2rem">
    CSVをアップロードまたは履歴から選択してください
  </p>
</main>
<script src="app.js"></script>
</body>
</html>
